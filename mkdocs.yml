site_name: learning-llm-agents
site_description: "A hands-on, multi-phase plan for learning to build LLM agents from scratch."
site_url: https://yinliang420.github.io/learning-llm-agents/
repo_url: https://github.com/yinliang420/learning-llm-agents
repo_name: yinliang420/learning-llm-agents

docs_dir: .
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: en

nav:
  - Home: README.md
  - Learning Plan: LEARNING_PLAN.md
  - Phase 1 — 5 Patterns:
      - Overview: phase1_patterns/README.md
      - "01 · Augmented LLM": phase1_patterns/01_augmented_llm/README.md
      - "02 · Tool-use Loop": phase1_patterns/02_tool_loop/README.md
      - "03 · Routing": phase1_patterns/03_routing/README.md
      - "04 · Plan-then-Execute": phase1_patterns/04_plan_execute/README.md
      - "05 · Reflection": phase1_patterns/05_reflection/README.md
  - Phase 2 — Project:
      - Overview: phase2_project/README.md
  - Progress Reports:
      - "Day 1 · Bootstrap": reports/report_2026-05-12_agent-lab-bootstrap.md
      - "Day 2 · Smoke Tests": reports/report_2026-05-13_smoke-verification.md
      - "Day 3 · Public Repo": reports/report_2026-05-13_publish-public-repo.md
      - "Day 3 · Pattern 01": reports/report_2026-05-13_phase1-pattern01.md
  - Notes:
      - Daily Journal: notes/journal.md
      - Conceptual Q&A: notes/conceptual-qa.md

not_in_nav: |
  data/**
  .venv/**
  site/**
  reports/.gitkeep
  data/.gitkeep
